<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Course Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg_color: #0f172a;
            --card_bg_color: #151e31;
            --card_border_color: #2c3346;
            --card_shadow: #00000080;
            --card_hover_border_color: #384158;
            --white_text: #fff;
            --gray_text: #99a1af;
            --input_bg_color: #21293c;
            --input_border_color: #38404f;
            --btn_g_left: #923aea;
            --btn_g_right: #2cd1ee;
            --btn_text_color: #ffffff;
            --navbar_bg_color: #1b2637;
            --header_bg_color: #162033;
            --success_green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', Arial, sans-serif; }

        body {
            min-height: 100vh;
            background-color: var(--bg_color);
            overflow: hidden; 
        }

        h1, h2 { color: var(--white_text); margin-bottom: 15px; }
        p, label { color: var(--gray_text); margin-bottom: 15px; }

        /* TOP HEADER */ 
           
        .admin_container {
            margin: 0; padding: 0; display: flex; width: 100vw; position: fixed; top: 0; z-index: 1000;
        }

        .logo_name {
            width: 240px; min-width: 240px; height: 90px; display: flex; align-items: center;
            padding: 0 15px; background-color: var(--navbar_bg_color);
            border: 1px solid var(--gray_text); border-top: none;
            transition: all 0.3s ease;
        }
        .logo_name img { height: 50px; border-radius: 3px; }
        .logo_name .name { padding-left: 15px; padding-top: 15px;}
        .logo_name .name h2 { font-size: 20px; margin-bottom: 2px;}
        .logo_name .name p { font-size: 12px; }

        .heading_section {
            flex: 1; height: 90px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; background-color: var(--header_bg_color);
            border: 1px solid var(--gray_text); border-top: none; border-left: none;
        }
        
        /* Menu Bar Icon Design */
        #menuToggle {
            font-size: 32px; color: var(--white_text); cursor: pointer;
            transition: 0.3s; margin-right: 15px;
        }
        #menuToggle:hover { color: var(--btn_g_right); }

        .heading_section .title h2 { margin-bottom: 5px; font-size: 22px;}
        .heading_section .title p { margin-bottom: 0; font-size: 13px;}

        .profile_logo {
            background: linear-gradient(135deg, var(--btn_g_left), var(--btn_g_right));
            border-radius: 50%; color: var(--white_text); display: flex; align-items: center; justify-content: center;
            width: 50px; height: 50px;
        }
        .profile_logo h3 { margin: 0; font-size: 18px; }

        /*  SIDEBAR WRAPPER*/
        .sidebar_wrapper {
            position: fixed;
            top: 90px; left: 0;
            width: 240px; height: calc(100vh - 90px);
            background-color: var(--navbar_bg_color);
            border: 1px solid var(--gray_text); border-top: none;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 100;
            transition: transform 0.3s ease; /* Slide animation */
        }

        .navbar { display: flex; flex-direction: column; padding: 20px 0; overflow-y: auto; }
        .navbar a {
            text-decoration: none; margin-bottom: 10px; color: var(--white_text); font-size: 16px;
            padding: 12px 20px; margin: 0 20px 10px 20px; display: block; border-radius: 15px; transition: 0.3s;
        }
        .active {
            background: linear-gradient(135deg, var(--btn_g_left), var(--btn_g_right));
            font-size: 18px; color: var(--white_text); box-shadow: 0 10px 25px var(--card_shadow);
        }
        .active:hover { box-shadow: 0 0 10px 1px var(--btn_g_right); }
        .deactive { padding-left: 40px; }
        .deactive:hover { background-color: var(--bg_color); padding-left: 45px; }

        .logout_section {
            background-color: var(--navbar_bg_color); height: 90px;
            border-top: 1px solid var(--gray_text); display: flex; justify-content: center; align-items: center;
        }
        .logout_section h2 { color: red; margin: 0; font-size: 18px; cursor: pointer; display: flex; align-items: center; gap: 8px;}

        /*  MAIN CONTENT*/
        .content_wrapper {
            position: absolute; top: 90px; left: 240px;
            width: calc(100vw - 240px); height: calc(100vh - 90px);
            overflow-y: auto; padding: 30px 40px; background-color: var(--bg_color);
            transition: left 0.3s ease, width 0.3s ease; /* Slide animation */
        }

        .stats_grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat_card { background: var(--card_bg_color); padding: 20px; border-radius: 15px; border: 1px solid var(--card_border_color); }
        .stat_card span { color: var(--gray_text); font-size: 12px; }
        .stat_card p { font-size: 24px; font-weight: bold; margin-top: 5px; color: var(--btn_g_right); margin-bottom: 0;}
        .stat_card:nth-child(2) p { color: var(--success_green); }

        .management_box { background: var(--card_bg_color); border-radius: 20px; padding: 25px; border: 1px solid var(--card_border_color); }
        .m_header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .m_header h3 { color: white; margin: 0;}
        
        .add_btn { background: linear-gradient(135deg, var(--btn_g_left), var(--btn_g_right)); border: none; padding: 10px 20px; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .add_btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(146, 58, 234, 0.4); }

        .course_grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .course_card { background: var(--input_bg_color); border-radius: 15px; padding: 25px; border: 1px solid var(--card_border_color); transition: 0.3s; display: flex; flex-direction: column;}
        .course_card:hover { border-color: var(--btn_g_left); transform: translateY(-5px); }
        
        .course_card .icon_box { width: 45px; height: 45px; background: linear-gradient(135deg, var(--btn_g_left), var(--btn_g_right)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 15px; color: white;}
        .course_card h3 { font-size: 20px; margin-bottom: 10px; line-height: 1.2;color: #ffffff;}
        .course_card .desc { font-size: 13px; color: var(--gray_text); line-height: 1.6; margin-bottom: 15px; flex-grow: 1;}
        .domain_tag { background: rgba(146, 58, 234, 0.15); color: #c48fff; font-size: 11px; padding: 5px 12px; border-radius: 20px; display: inline-block; margin-bottom: 20px; align-self: flex-start;}
        
        .metrics_row { display: flex; justify-content: space-between; background: var(--card_bg_color); padding: 12px 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--card_border_color);}
        .m_item { text-align: center; }
        .m_item strong { display: block; font-size: 14px; margin-top: 0; color: white;}
        .m_item span { font-size: 10px; color: var(--gray_text); display: block; margin-bottom: 0;}

        .card_btns { display: flex; gap: 10px; margin-top: auto;}
        .edit_btn { flex: 1; background: none; border: 1px solid var(--btn_g_left); color: var(--btn_g_left); padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .edit_btn:hover { background: var(--btn_g_left); color: white; }
        .del_btn { width: 45px; background: rgba(255, 92, 92, 0.1); border: none; color: #ff5c5c; border-radius: 8px; cursor: pointer; font-size: 18px; transition: 0.3s;}
        .del_btn:hover { background: #ff5c5c; color: white; }

        /* Modals */
        .modal_overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal_content { background: var(--card_bg_color); width: 100%; max-width: 450px; padding: 30px; border-radius: 15px; border: 1px solid var(--card_border_color); animation: slideIn 0.3s ease; max-height: 90vh; overflow-y: auto; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal_content h2 { margin-bottom: 20px; font-size: 20px; }
        .form_group { margin-bottom: 15px; }
        .form_group label { display: block; font-size: 12px; color: var(--gray_text); margin-bottom: 5px; }
        .form_group input, .form_group textarea { width: 100%; background: var(--input_bg_color); border: 1px solid var(--input_border_color); padding: 10px; border-radius: 8px; color: white; outline: none; transition: 0.3s; }
        .form_group input:focus, .form_group textarea:focus { border-color: var(--btn_g_right); }
        .modal_btns { display: flex; gap: 10px; margin-top: 20px; }
        .save_btn { flex: 1; background: linear-gradient(135deg, var(--btn_g_left), var(--btn_g_right)); border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .close_btn { flex: 1; background: none; border: 1px solid var(--gray_text); color: var(--gray_text); padding: 12px; border-radius: 8px; cursor: pointer; }

        /* TOGGLE SIDEBAR LOGIC & MEDIA QUERIES*/
        
        /* 1. Desktop Toggle Hide */
        .sidebar_wrapper.closed { transform: translateX(-100%); }
        .content_wrapper.expanded { left: 0; width: 100vw; }

        /* 2. Mobile / Tablet Responsive */
        @media (max-width: 992px) {
            .sidebar_wrapper {
                transform: translateX(-100%); /* Hidden default on mobile */
                z-index: 1000;
                box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            }
            .sidebar_wrapper.open {
                transform: translateX(0); /* Show when menu is clicked */
            }
            .content_wrapper { left: 0; width: 100vw; }
            .logo_name { display: none; } /* Hide logo box to save space on mobile */
            .heading_section { padding: 0 20px; border-left: none; }
        }

        @media (max-width: 768px) {
            body { overflow: auto; } 
            .heading_section .title h2 { font-size: 18px; }
            .profile_logo { width: 40px; height: 40px; }
            .profile_logo h3 { font-size: 14px; }
            .stats_grid { grid-template-columns: 1fr 1fr; }
            .course_grid { grid-template-columns: 1fr; }
            .content_wrapper { position: relative; top: 90px; height: auto; overflow: visible;}
        }
    </style>
</head>
<body>
    
    <div class="admin_container">
        <div class="logo_name">
            <img src="/frontend/future_tech_logo.png">
            <div class="name">
                <h2>Futuretech</h2>
                <p>Admin Portal</p>
            </div>
        </div>
        <div class="heading_section">
            <div style="display: flex; align-items: center;">
                <i class='bx bx-menu' id="menuToggle"></i>
                <div class="title">
                    <h2>My Dashboard</h2>
                    <p>Welcome back, <span>Admin Name</span></p>
                </div>
            </div>
            <div class="profile_logo">
                <h3>AN</h3>
            </div>
        </div>
    </div>

     <div class="main">
    <div class="sidebar_wrapper">
        <nav class="navbar">
            <a href="#dashboard" class="deactive">Dashboard</a>
            <a href="#student_dir" class="deactive">Student Directory</a>
            <a href="#course_mgmt" class="active">Course Management</a>
            <a href="#fee_history" class="deactive">Fee Tracker</a>
            <a href="#assignment" class="deactive">Assignments</a>
            <a href="#register" class="deactive">Register</a>
            <a href="#profile" class="deactive">Settings</a>
        </nav>
        <div class="logout_section">
            <h2><i class='bx bx-log-out'></i> Logout</h2>
        </div>
    </div>
    
     <div class="main">
    <div class="content_wrapper">
        <section class="stats_grid">
    <div class="stat_card"><span>Total Courses</span><p id="statTotal">0</p></div>
    <div class="stat_card"><span>Active Courses</span><p id="dynamicActiveCourses">0</p></div>
    <div class="stat_card"><span>Total Students</span> <p id="dynamicStudentCount">Loading...</p></div>
    <div class="stat_card"><span>Domains</span><p id="dynamicDomains">0</p></div>
    </section>
       

        <div class="management_box">
            <div class="m_header">
                <h3>Course Management</h3>
                <button class="add_btn" onclick="openModal()"><i class='bx bx-plus'></i> Add New Course</button>
            </div>
            <div class="course_grid" id="courseGrid">
                </div>
        </div>
    </div>

    <div class="modal_overlay" id="modalOverlay"> 
        <div class="modal_content">
            <h2>Create New Course</h2>
            <form id="addForm">
                <div class="form_group"><label>Course Title</label><input type="text" name="course_name" required></div>
                <div class="form_group"><label>Domain</label><input type="text" name="domain" required></div>
                <div class="form_group"><label>Duration</label><input type="text" name="duration" required></div>
                <div class="form_group"><label>Description</label><textarea name="description" rows="2" required></textarea></div>
                <div class="form_group"><label>Fee (₹)</label><input type="number" name="fee" required></div>
                <div class="modal_btns">
                    <button type="button" class="close_btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="save_btn">Add Course</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal_overlay" id="updateModalOverlay"> 
        <div class="modal_content">
            <h2>Update Course</h2>
            <form id="updateForm">
                <input type="hidden" id="oldTitle">
                <div class="form_group"><label>Course Title</label><input type="text" id="upTitle" required></div>
                <div class="form_group"><label>Domain</label><input type="text" id="upDomain" required></div>
                <div class="form_group"><label>Duration</label><input type="text" id="upDuration" required></div>
                <div class="form_group"><label>Description</label><textarea id="upDesc" rows="2" required></textarea></div>
                <div class="form_group"><label>Fee (₹)</label><input type="number" id="upFee" required></div>
                <div class="modal_btns">
                    <button type="button" class="close_btn" onclick="closeUpdateModal()">Cancel</button>
                    <button type="submit" class="save_btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
   </div>
<script>
// MENU TOGGLE LOGIC (Slide In / Slide Out)

document.getElementById("menuToggle").addEventListener("click", function() {
    const sidebar = document.querySelector(".sidebar_wrapper");
    const content = document.querySelector(".content_wrapper");
    
    if (window.innerWidth > 992) {
        // Laptop var click kelyavar sidebar lapel (hide) ani content full screen hoil
        sidebar.classList.toggle("closed");
        content.classList.toggle("expanded");
    } else {
        // Mobile var click kelyavar sidebar baher yeil (show)
        sidebar.classList.toggle("open");
    }
});

// COURSE MANAGEMENT LOGIC (Backend Data)

let courses = [];
function loadCourses() {
    // Cache band karnyashathi ?t=... takle ahe
    fetch("/FuturetechAdmin/CourseServlet?t=" + new Date().getTime())
    .then(res => res.json())
    .then(data => {
        // 1. Total Students backend madhun yetoy to ithe update hoil
        const countLabel = document.getElementById("dynamicStudentCount");
        if(countLabel && data.totalStudentCount !== undefined) {
            countLabel.innerText = data.totalStudentCount;
        }
        
        if(data.courses) { 
            courses = data.courses; 
            renderCourses();
        }
    })
    .catch(err => {
        console.error("Fetch error:", err);
        document.getElementById("dynamicStudentCount").innerText = "Error";
    });
}

function renderCourses() {
    const grid = document.getElementById("courseGrid");
    
    // 2. Total Courses ani Active Courses Update karne
    const totalCourseCount = courses.length;
    document.getElementById("statTotal").innerText = totalCourseCount;
    
    const activeLabel = document.getElementById("dynamicActiveCourses");
    if(activeLabel) activeLabel.innerText = totalCourseCount; // Sadhyasathi sagle courses active ahet ase manuyat

    // 3. Dynamic Domains Count karne (Duplicates kadhun takun)
    const domainLabel = document.getElementById("dynamicDomains");
    if(domainLabel) {
        // Set() cha vāpar kelyāmuḷe duplicate domains 1 ch veles count hotil
        const uniqueDomains = new Set(courses.map(course => course.domain));
        domainLabel.innerText = uniqueDomains.size;
    }

    // Courses display karne
    grid.innerHTML = "";
    courses.forEach((course, index) => {
        grid.innerHTML += `
            <div class="course_card">
                <div class="icon_box"><i class='bx bx-book-open'></i></div>
                <h3>${course.title}</h3>
                <div class="domain_tag">${course.domain}</div>
                <p class="desc">${course.desc}</p>
                <div class="metrics_row">
                    <div class="m_item"><strong>${course.duration}</strong><span>Duration</span></div>
                    <div class="m_item"><strong>₹${course.fee}</strong><span>Fee</span></div>
                </div>
                <div class="card_btns">
                    <button class="edit_btn" onclick="openEditModal(${index})">Edit</button>
                    <button class="del_btn" onclick="deleteCourse(${index})"><i class='bx bx-trash'></i></button>
                </div>
            </div>`;
    });
}

document.addEventListener("DOMContentLoaded", function() {
    loadCourses();

    const addForm = document.getElementById("addForm");
    if(addForm) {
        addForm.addEventListener("submit", function(e) {
            e.preventDefault();
            if(confirm("⚠️ Are you sure you want to add this course?")) {
                const formData = new FormData(addForm);
                const params = new URLSearchParams(formData);
                params.append("action", "add"); 

                fetch("/FuturetechAdmin/CourseServlet", {
                    method: "POST",
                    body: params,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                })
                .then(res => res.text())
                .then(msg => {
                    if (msg.trim() === "success") {
                        alert("✅ Course Added Successfully!");
                        closeModal();
                        addForm.reset();
                        loadCourses(); 
                    } else { alert("❌ Error: Course not added."); }
                }).catch(err => alert("Server connection failed."));
            }
        });
    }

    const upForm = document.getElementById("updateForm");
    if(upForm) {
        upForm.addEventListener("submit", function(e) {
            e.preventDefault();
            const params = new URLSearchParams();
            params.append("action", "update"); 
            params.append("oldTitle", document.getElementById("oldTitle").value);
            params.append("course_name", document.getElementById("upTitle").value);
            params.append("domain", document.getElementById("upDomain").value);
            params.append("duration", document.getElementById("upDuration").value);
            params.append("description", document.getElementById("upDesc").value);
            params.append("fee", document.getElementById("upFee").value);

            fetch("/FuturetechAdmin/CourseServlet", {
                method: "POST",
                body: params,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
            .then(res => res.text())
            .then(msg => {
                if (msg.trim() === "success") {
                    alert("✅ Course Updated Successfully!");
                    closeUpdateModal();
                    loadCourses();
                } else { alert("❌ Error: Course not updated."); }
            });
        });
    }
});

function deleteCourse(index) {
    if(confirm("🗑️ Are you sure you want to delete this course?")) {
        const params = new URLSearchParams();
        params.append("action", "delete");
        params.append("title", courses[index].title);
        fetch("/FuturetechAdmin/CourseServlet", {
            method: "POST",
            body: params,
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        }).then(() => loadCourses());
    }
}

function openEditModal(index) {
    const c = courses[index];
    document.getElementById("oldTitle").value = c.title;
    document.getElementById("upTitle").value = c.title;
    document.getElementById("upDomain").value = c.domain;
    document.getElementById("upDuration").value = c.duration;
    document.getElementById("upDesc").value = c.desc;
    document.getElementById("upFee").value = c.fee;
    document.getElementById("updateModalOverlay").style.display = "flex";
}

function openModal() { document.getElementById("modalOverlay").style.display = "flex"; }
function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }
function closeUpdateModal() { document.getElementById("updateModalOverlay").style.display = "none"; }
</script>
</body>
</html>
